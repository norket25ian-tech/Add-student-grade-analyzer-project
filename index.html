<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro de Alunos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <main class="container">

        <h1>Cadastro de Alunos</h1>

        <div class="form">

            <label for="nome">Nome</label>
            <input type="text" id="nome" placeholder="Digite o nome">

            <label for="nota">Nota</label>
            <input type="number" id="nota" placeholder="Digite a nota">

            <input type="button" value="Cadastrar" id="cadastrar" onclick="cadastrar()">

            <input type="button" value="Finalizar" id="finalizar" onclick="finalizar()">

        </div>

        <select id="lista" size="8"></select>

        <div id="res">
          
        </div>

    </main>

    <script src="script.js"></script>

</body>
</html>
